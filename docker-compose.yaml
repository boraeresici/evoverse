services:
  postgres:
    image: postgres:16-alpine
    container_name: evoverse-postgres
    environment:
      POSTGRES_DB: evoverse
      POSTGRES_USER: evoverse
      POSTGRES_PASSWORD: ${EVOVERSE_POSTGRES_PASSWORD:-evoverse}
    # Internal only; local dev publishes host ports via docker-compose.override.yaml.
    volumes:
      - evoverse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evoverse -d evoverse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The app services below are for a full-stack deploy (e.g. Coolify Docker
  # Compose). Local development can still run just the database with
  # `docker compose up -d postgres` and start the API/worker/frontend manually.
  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EVOVERSE_ENV: production
      EVOVERSE_PERSISTENCE: postgres
      EVOVERSE_DATABASE_URL: postgresql+psycopg://evoverse:${EVOVERSE_POSTGRES_PASSWORD:-evoverse}@postgres:5432/evoverse
      EVOVERSE_SEED: ${EVOVERSE_SEED:-4211}
      EVOVERSE_BOOT_TICKS: ${EVOVERSE_BOOT_TICKS:-96}
      # Demo default keeps the local fallback on (observer/catalyst work) but locks
      # the admin surface and destructive ops. Flip these for a private instance.
      EVOVERSE_AUTH_ALLOW_LOCAL_FALLBACK: ${EVOVERSE_AUTH_ALLOW_LOCAL_FALLBACK:-true}
      EVOVERSE_ALLOW_LOCAL_ADMIN: ${EVOVERSE_ALLOW_LOCAL_ADMIN:-false}
      EVOVERSE_ALLOW_DESTRUCTIVE_OPS: ${EVOVERSE_ALLOW_DESTRUCTIVE_OPS:-false}
    # Apply migrations, then serve the API.
    command: >
      sh -c "python -m app.persistence.migrations upgrade && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # Internal only — the frontend reaches it at http://backend:8000. Publishing a
    # host port conflicts on shared hosts; local dev uses the override file.
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    build: ./backend
    depends_on:
      backend:
        condition: service_started
    environment:
      EVOVERSE_ENV: production
      EVOVERSE_PERSISTENCE: postgres
      EVOVERSE_DATABASE_URL: postgresql+psycopg://evoverse:${EVOVERSE_POSTGRES_PASSWORD:-evoverse}@postgres:5432/evoverse
      EVOVERSE_SEED: ${EVOVERSE_SEED:-4211}
      EVOVERSE_BOOT_TICKS: ${EVOVERSE_BOOT_TICKS:-96}
      EVOVERSE_WORKER_INTERVAL_SECONDS: ${EVOVERSE_WORKER_INTERVAL_SECONDS:-2}
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_* are inlined at build time, so they must be build args
      # (Coolify passes matching env vars as build args). Rebuild to change them.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-local}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://evoverse.studiobinary.co}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_CF_BEACON_TOKEN: ${NEXT_PUBLIC_CF_BEACON_TOKEN:-}
    depends_on:
      backend:
        condition: service_started
    environment:
      # Server-side reads and BFF routes reach the backend over the compose network.
      EVOVERSE_API_URL: http://backend:8000
    # This is the public web service. On Coolify, assign the domain to `frontend`
    # and its proxy routes to this exposed port (no host port publishing needed).
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  evoverse-postgres:
